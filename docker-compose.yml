services:
  db:
    image: postgres:17
    container_name: drf_celery_tutorial_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - drf_celery_tutorial_postgres_data:/var/lib/postgresql/data

volumes:
  drf_celery_tutorial_postgres_data:
